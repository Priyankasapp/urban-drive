<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>UrbanDrive | Executive Login</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-container": "#1b1b1b",
              "on-secondary": "#ffffff",
              tertiary: "#000000",
              "on-secondary-container": "#616363",
              "outline-variant": "#cfc4c5",
              error: "#ba1a1a",
              "on-tertiary-fixed": "#1b1b1b",
              "secondary-fixed-dim": "#c6c6c7",
              "tertiary-fixed-dim": "#c6c6c6",
              "surface-container-highest": "#e2e2e2",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed": "#1a1c1c",
              "inverse-on-surface": "#f1f1f1",
              "on-tertiary-fixed-variant": "#474747",
              "on-primary-fixed": "#1b1b1b",
              "on-secondary-fixed-variant": "#454747",
              "on-primary-fixed-variant": "#474747",
              "error-container": "#ffdad6",
              outline: "#7e7576",
              background: "#f9f9f9",
              "surface-container-low": "#f3f3f3",
              "on-primary-container": "#848484",
              "text-primary": "#111111",
              surface: "#F8F8F8",
              "surface-container-lowest": "#ffffff",
              "on-primary": "#ffffff",
              "inverse-surface": "#303030",
              "on-tertiary-container": "#848484",
              "text-secondary": "#666666",
              "primary-fixed": "#e2e2e2",
              "surface-tint": "#5e5e5e",
              border: "#E5E5E5",
              "inverse-primary": "#c6c6c6",
              "accent-success": "#22C55E",
              "surface-bright": "#f9f9f9",
              "primary-fixed-dim": "#c6c6c6",
              "on-error-container": "#93000a",
              "on-surface-variant": "#4c4546",
              "on-error": "#ffffff",
              "on-surface": "#1b1b1b",
              "glass-fill": "rgba(255, 255, 255, 0.7)",
              "secondary-fixed": "#e2e2e2",
              "tertiary-fixed": "#e2e2e2",
              primary: "#000000",
              "surface-dim": "#dadada",
              "surface-variant": "#e2e2e2",
              "surface-container-high": "#e8e8e8",
              "secondary-container": "#dfe0e0",
              "on-background": "#1b1b1b",
              "tertiary-container": "#1b1b1b",
              "surface-container": "#eeeeee",
              secondary: "#5d5f5f",
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "0.5rem",
              xl: "0.75rem",
              full: "9999px",
            },
            spacing: {
              gutter: "24px",
              unit: "8px",
              "container-max": "1440px",
              "margin-desktop": "64px",
              "margin-mobile": "20px",
            },
            fontFamily: {
              "headline-md": ["Inter"],
              "headline-lg-mobile": ["Inter"],
              "headline-lg": ["Inter"],
              "label-sm": ["Inter"],
              "display-lg": ["Inter"],
              "body-md": ["Inter"],
              "body-lg": ["Inter"],
            },
            fontSize: {
              "headline-md": [
                "24px",
                { lineHeight: "32px", fontWeight: "600" },
              ],
              "headline-lg-mobile": [
                "28px",
                {
                  lineHeight: "36px",
                  letterSpacing: "-0.02em",
                  fontWeight: "600",
                },
              ],
              "headline-lg": [
                "32px",
                {
                  lineHeight: "40px",
                  letterSpacing: "-0.02em",
                  fontWeight: "600",
                },
              ],
              "label-sm": [
                "12px",
                {
                  lineHeight: "16px",
                  letterSpacing: "0.05em",
                  fontWeight: "600",
                },
              ],
              "display-lg": [
                "64px",
                {
                  lineHeight: "72px",
                  letterSpacing: "-0.04em",
                  fontWeight: "700",
                },
              ],
              "body-md": ["16px", { lineHeight: "24px", fontWeight: "400" }],
              "body-lg": ["18px", { lineHeight: "28px", fontWeight: "400" }],
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 300,
          "GRAD" 0,
          "opsz" 24;
      }
      .executive-shadow {
        box-shadow: 0px 10px 40px rgba(0, 0, 0, 0.04);
      }
      .glass-panel {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(20px);
      }
      body {
        background-color: #ffffff;
        overflow-x: hidden;
      }
      input:focus + label,
      input:not(:placeholder-shown) + label {
        transform: translateY(-24px) scale(0.85);
        color: #111111;
      }
      .input-underline {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 0%;
        height: 1px;
        background-color: #000000;
        transition: width 0.3s ease-out;
      }
      input:focus ~ .input-underline {
        width: 100%;
      }
    </style>
  </head>
  <body class="font-body-md text-text-primary antialiased">
    <!-- TopAppBar Shell (Suppressed for focused Login, but keeping Wordmark for Branding) -->
    <header
      class="fixed top-0 w-full z-50 flex justify-between items-center px-margin-mobile md:px-margin-desktop py-8 bg-transparent pointer-events-none"
    >
      <div class="pointer-events-auto">
        <span
          class="font-headline-lg text-headline-lg font-black tracking-tighter text-primary"
          >UrbanDrive</span
        >
      </div>
      <div class="hidden md:flex gap-8 pointer-events-auto">
        <a
          class="font-label-sm text-label-sm text-text-secondary hover:text-primary transition-colors"
          href="#"
          >FLEET</a
        >
        <a
          class="font-label-sm text-label-sm text-text-secondary hover:text-primary transition-colors"
          href="#"
          >CONCIERGE</a
        >
        <a
          class="font-label-sm text-label-sm text-text-secondary hover:text-primary transition-colors"
          href="#"
          >SUPPORT</a
        >
      </div>
    </header>
    <main class="min-h-screen flex flex-col md:flex-row">
      <!-- Visual Section (Split Left) -->
      <section class="hidden md:flex w-1/2 relative overflow-hidden bg-black">
        <div
          class="absolute inset-0 z-10 bg-gradient-to-r from-black/20 via-transparent to-white/5"
        ></div>
        <div
          class="absolute inset-0 w-full h-full bg-cover bg-center grayscale contrast-125 scale-105"
          data-alt="A cinematic, high-contrast monochrome photograph of a sleek, black luxury sedan parked on a rain-slicked city street at night. Towering skyscrapers with illuminated windows create a dramatic urban canyon. The lighting is moody and atmospheric, with bright highlights reflecting off the car's polished surface and the wet pavement. The overall aesthetic is executive, minimalist, and powerful, capturing a sense of high-end movement and urban sophistication."
          style="
            background-image: url(&quot;https://lh3.googleusercontent.com/aida-public/AB6AXuD14XN9DOxiZwZRgKieQkxHLjbWosV3Qp-ieJjo0Zv__Uh8Sc51RqaRHv_xXD2zeScFOxjmr4zFoW17tv1KN6OZOv1TJGpV4O137OO0B9wbe5AzVyONJ7CExJvZz-0YdB0uczAP6IiyGIFZcr69PiyBWEedffAyUHrevC9Xka2WdrL8ckbK1r6Wy8mydvXX72ys6lH-QesgXY9KEbGvkxmy2ybGsHojPXTl5gcGRmokMcLynvaKpGcYu8JjgZnHddbrwkjpPYjtFCWs&quot;);
          "
        ></div>
        <div
          class="absolute bottom-margin-desktop left-margin-desktop z-20 max-w-lg"
        >
          <p
            class="font-label-sm text-label-sm text-on-secondary/60 mb-2 uppercase tracking-widest"
          >
            Global Access
          </p>
          <h2
            class="font-display-lg text-headline-lg md:text-display-lg text-on-secondary leading-tight"
          >
            Precision in motion.
          </h2>
        </div>
      </section>
      <!-- Login Form Section (Split Right) -->
      <section
        class="w-full md:w-1/2 flex items-center justify-center bg-white px-margin-mobile md:px-margin-desktop py-20 relative"
      >
        <div class="w-full max-w-md">
          <!-- Branding for Mobile -->
          <div class="md:hidden mb-12">
            <span
              class="font-headline-lg-mobile text-headline-lg-mobile font-black tracking-tighter text-primary"
              >UrbanDrive</span
            >
          </div>
          <div class="mb-12">
            <h1
              class="font-headline-lg text-headline-lg text-text-primary mb-2"
            >
              Executive Portal
            </h1>
            <p class="font-body-md text-text-secondary">
              Secure verification for authorized personnel.
            </p>
          </div>
          <form class="space-y-10" onsubmit="event.preventDefault()">
            <!-- Corporate Email Input -->
            <div class="relative group">
              <input
                class="peer w-full bg-transparent border-0 border-b border-border py-4 focus:ring-0 focus:outline-none font-body-lg transition-colors placeholder-transparent"
                id="email"
                placeholder=" "
                type="email"
              />
              <label
                class="absolute left-0 top-4 text-text-secondary font-body-md pointer-events-none transition-all duration-300 origin-left"
                for="email"
              >
                Corporate Email
              </label>
              <div class="input-underline"></div>
            </div>
            <!-- Security Key (Password) Input -->
            <div class="relative group">
              <input
                class="peer w-full bg-transparent border-0 border-b border-border py-4 focus:ring-0 focus:outline-none font-body-lg transition-colors placeholder-transparent"
                id="password"
                placeholder=" "
                type="password"
              />
              <label
                class="absolute left-0 top-4 text-text-secondary font-body-md pointer-events-none transition-all duration-300 origin-left"
                for="password"
              >
                Security Key
              </label>
              <div class="input-underline"></div>
              <button
                class="absolute right-0 top-4 text-text-secondary hover:text-primary transition-colors"
                type="button"
              >
                <span class="material-symbols-outlined text-[20px]"
                  >visibility_off</span
                >
              </button>
            </div>
            <!-- Actions -->
            <div class="flex items-center justify-between pt-4">
              <div class="flex items-center gap-2">
                <input
                  class="w-4 h-4 text-primary bg-surface border-border rounded-sm focus:ring-primary focus:ring-offset-0"
                  id="remember"
                  type="checkbox"
                />
                <label
                  class="font-label-sm text-label-sm text-text-secondary cursor-pointer"
                  for="remember"
                  >Remember Access</label
                >
              </div>
              <a
                class="font-label-sm text-label-sm text-text-secondary hover:text-primary transition-colors underline decoration-border underline-offset-4"
                href="#"
                >Forgot Password</a
              >
            </div>
            <button
              class="w-full bg-primary text-on-primary py-5 rounded-none font-label-sm text-label-sm uppercase tracking-widest hover:bg-neutral-800 active:scale-[0.98] transition-all duration-300 executive-shadow"
            >
              Authenticate Access
            </button>
          </form>
          <div class="mt-12 pt-8 border-t border-border flex flex-col gap-4">
            <p
              class="font-label-sm text-label-sm text-text-secondary text-center"
            >
              New to UrbanDrive?
              <a
                class="text-primary font-bold ml-1 hover:underline underline-offset-4"
                href="#"
                >Create Account</a
              >
            </p>
          </div>
          <!-- Footer Links -->
          <div class="mt-20 flex justify-center gap-6">
            <a
              class="font-label-sm text-label-sm text-text-secondary/50 hover:text-text-secondary transition-colors"
              href="#"
              >Privacy</a
            >
            <a
              class="font-label-sm text-label-sm text-text-secondary/50 hover:text-text-secondary transition-colors"
              href="#"
              >Legal</a
            >
            <a
              class="font-label-sm text-label-sm text-text-secondary/50 hover:text-text-secondary transition-colors"
              href="#"
              >© 2024 UrbanDrive</a
            >
          </div>
        </div>
      </section>
    </main>
    <!-- Subtle atmospheric JS for the image section -->
    <script>
      document.addEventListener("mousemove", (e) => {
        const visual = document.querySelector(
          'section div[style*="background-image"]',
        );
        if (!visual) return;

        const x = (e.clientX / window.innerWidth - 0.5) * 15;
        const y = (e.clientY / window.innerHeight - 0.5) * 15;

        visual.style.transform = `scale(1.05) translate(${x}px, ${y}px)`;
      });

      // Suppress nav as per instructions for Task-Focused Login
      // BottomNavBar suppression logic:
      // Page intent is Transactional (Login), so BottomNavBar is omitted.
    </script>
  </body>
</html>
